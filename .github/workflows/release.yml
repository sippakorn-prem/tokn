name: release

# Push a version tag to build, sign, notarize, and publish a GitHub Release
# with the DMG plus the auto-updater artifacts (.app.tar.gz, .sig, latest.json).
#
#   1. bump "version" in src-tauri/tauri.conf.json  (e.g. 0.2.0)
#   2. git tag v0.2.0 && git push origin v0.2.0
#
# Required repo secrets (Settings -> Secrets and variables -> Actions):
#   APPLE_CERTIFICATE               base64 of your Developer ID Application .p12
#   APPLE_CERTIFICATE_PASSWORD      the .p12 export password
#   APPLE_SIGNING_IDENTITY          "Developer ID Application: Name (TEAMID)"
#   APPLE_ID                        your Apple ID email
#   APPLE_PASSWORD                  an app-specific password
#   APPLE_TEAM_ID                   your 10-char Team ID
#   TAURI_SIGNING_PRIVATE_KEY       contents of ~/.tauri/tokn-updater.key
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  the key's password ("" if none)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        env:
          # Code signing + notarization
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Updater artifact signing
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Release publishing
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target universal-apple-darwin
          tagName: ${{ github.ref_name }}
          releaseName: "Tokn ${{ github.ref_name }}"
          releaseBody: |
            ## Install

            1. Download the **`.dmg`** below and open it.
            2. Drag **Tokn** into your **Applications** folder.
            3. Launch it — Tokn lives in the **menu bar** (left-click for usage, right-click to Quit).

            Signed with an Apple Developer ID and notarized by Apple, so it opens
            without Gatekeeper warnings. Universal build (Apple Silicon + Intel),
            requires macOS 10.15+.

            You must be signed in to the Claude Code CLI — Tokn reads that login
            from the macOS Keychain. See the [README](https://github.com/sippakorn-prem/tokn#readme) for details.

            Already running Tokn? It auto-updates to this version on next launch.
          releaseDraft: false
          prerelease: false
